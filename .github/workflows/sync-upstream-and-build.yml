name: 🔄 自动同步上游并构建

# ============================================================================
# 工作流作用：
#   每天定时检查上游 Replica0110/Lyrico 是否有新提交：
#     1. 有更新 → 把本 fork 的自定义提交 rebase 到上游最新之上 → force push → 触发构建
#     2. 无更新 → 跳过（节省 Actions 额度）
#     3. rebase 冲突 → 工作流失败，需手动解决（不会丢掉自定义改动）
#
# 本 fork 的自定义改动（rebase 后会保留）：
#   - 内置插件自动安装（BuiltinPluginSeeder）
#   - MANAGE_EXTERNAL_STORAGE 权限 + 按路径添加文件夹（适配无 DocumentsUI 的手表）
#   - 文件系统扫描（querySongsFromFilesystemFolders）
#   - CI 工作流本身
#
# 查错指引：
#   - 工作流失败 + 日志出现 "rebase 冲突" → 看本文件底部「手动解决冲突」步骤
#   - 同步成功但没有触发构建 → 检查 GITHUB_TOKEN 是否有 actions: write 权限
#   - 构建触发但 APK 产出失败 → 看 build-builtin-v7.yml 的运行日志
# ============================================================================

on:
  schedule:
    # 每天 UTC 06:00 = 北京时间 14:00 运行
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: '即使上游无更新也强制触发一次构建'
        required: false
        default: 'false'

# contents: write  → rebase 后需要 push 到 master
# actions: write   → 需要用 gh workflow run 触发构建工作流
permissions:
  contents: write
  actions: write

# 同一时间只允许一个 sync 任务运行，避免并发 push 冲突
concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync-and-build:
    name: 同步上游并按需触发构建
    runs-on: ubuntu-latest

    steps:
      # ── 1. 检出本 fork 的完整历史（rebase 需要所有提交）─────────────────────
      - name: 📥 检出 fork
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # 必须为 0：rebase 需要完整提交历史

      # ── 2. 配置 git 提交者身份（rebase 产生的提交需要 author）─────────────────
      - name: 🔧 配置 git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ── 3. 核心步骤：同步上游 + rebase 保留自定义改动 ─────────────────────────
      # 逻辑说明：
      #   - 先计算 merge-base（fork 与上游的共同祖先）
      #   - 如果 merge-base == upstream/master：上游无新提交，跳过（省 Actions 额度）
      #   - 如果 merge-base != upstream/master：上游有新提交，需要 rebase
      #     · fork 没有自定义提交（CUSTOM_COUNT=0）→ 直接快进合并
      #     · fork 有自定义提交 → rebase 到上游最新之上
      #       - rebase 成功 → force push → 触发构建
      #       - rebase 冲突 → 打印冲突文件 → 中止 rebase → 工作流失败（不会丢代码）
      #
      # ⚠️ 不能用 LOCAL == UPSTREAM 判断是否有更新！
      #   fork 有自定义提交，LOCAL 永远不等于 UPSTREAM，会导致每天都触发构建。
      #   正确做法是比较 merge-base 和 upstream/master。
      #
      # 为什么不用 merge 而用 rebase？
      #   merge 会产生 merge commit，历史会很乱；rebase 保持线性历史，
      #   fork 的自定义提交始终在上游提交之上，方便查看和管理。
      - name: ⬆️ 同步上游 master（rebase 保留自定义改动）
        id: sync
        run: |
          set -e
          git remote add upstream https://github.com/Replica0110/Lyrico.git
          git fetch upstream master --tags
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/master)
          MERGE_BASE=$(git merge-base HEAD upstream/master)
          echo "─── 同步信息 ───"
          echo "本 fork HEAD  = $LOCAL"
          echo "上游 master   = $UPSTREAM"
          echo "共同祖先       = $MERGE_BASE"

          # 判断上游是否有新提交：看 merge-base 是否等于 upstream/master
          # 如果相等，说明 fork 已经包含了上游所有提交，无需操作
          if [ "$MERGE_BASE" = "$UPSTREAM" ]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "::notice::上游无新提交，跳过（共同祖先 == 上游 HEAD）"
          else
            # 上游有新提交，需要 rebase
            CUSTOM_COUNT=$(git rev-list --count "${MERGE_BASE}..HEAD")
            echo "fork 自定义提交数 = $CUSTOM_COUNT"

            if [ "$CUSTOM_COUNT" -eq 0 ]; then
              # 没有自定义提交，直接快进到上游
              echo "::notice::无自定义提交，快进合并"
              git merge upstream/master --ff-only
            else
              # 有自定义提交：rebase 到上游最新之上
              # 如果冲突，git rebase 会返回非零退出码
              if ! git rebase upstream/master; then
                echo "::error::rebase 冲突！自定义改动与上游改动冲突。"
                echo "::error::请手动解决冲突，步骤如下："
                echo "::error::  1. 克隆本 fork：git clone <fork-url> && cd Lyrico"
                echo "::error::  2. 添加上游：git remote add upstream https://github.com/Replica0110/Lyrico.git"
                echo "::error::  3. 拉取上游：git fetch upstream master"
                echo "::error::  4. 变基：git rebase upstream/master"
                echo "::error::  5. 解决冲突文件后：git add <文件> && git rebase --continue"
                echo "::error::  6. 推送：git push --force-with-lease origin master"
                echo ""
                echo "═══ 冲突文件列表 ═══"
                git diff --name-only --diff-filter=U || true
                echo "═══════════════════"
                # 中止 rebase，恢复仓库状态
                git rebase --abort
                exit 1
              fi
              echo "::notice::rebase 成功，自定义提交已重放到上游最新之上"
            fi

            # rebase 重写了历史，必须 force push
            # --force-with-lease 比 --force 安全：如果远程有意外的新提交会拒绝推送
            git push --force-with-lease origin master
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "::notice::已同步上游到 $(git rev-parse --short HEAD)"
          fi

      # ── 4. 触发 APK 构建 ──────────────────────────────────────────────────
      # 注意：rebase 后的 push 也会触发 build-builtin-v7.yml 的 push 事件，
      #       但那个工作流有 concurrency + cancel-in-progress，不会重复构建。
      #       这里用 gh workflow run 作为保底，确保即使 push 事件漏触发也能构建。
      - name: 🚀 触发 v7 构建
        if: steps.sync.outputs.updated == 'true' || github.event.inputs.force_build == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # ⚠️ gh 默认会查上游仓库（因为 fork 保留了 upstream remote 信息），
          #    必须用 --repo 显式指向本 fork
          echo "触发 build-builtin-v7.yml ..."
          gh workflow run build-builtin-v7.yml --ref master --repo "$GITHUB_REPOSITORY"
          # 等 5 秒让 run 出现在 API 中，然后打印链接方便查看
          sleep 5
          LATEST=$(gh run list --workflow=build-builtin-v7.yml --repo "$GITHUB_REPOSITORY" --limit 1 --json databaseId,url --jq '.[0]')
          echo "最新构建 run：$LATEST"
          echo "::notice::已触发构建，可在 Actions 页查看"

# ============================================================================
# 【手动解决 rebase 冲突】（当本工作流失败时按以下步骤操作）
#
#   git clone https://github.com/<你的用户名>/Lyrico.git
#   cd Lyrico
#   git remote add upstream https://github.com/Replica0110/Lyrico.git
#   git fetch upstream master
#   git rebase upstream/master
#   # ← 此时报冲突，打开冲突文件手动合并（保留你的自定义改动 + 接受上游的新改动）
#   git add .
#   git rebase --continue
#   git push --force-with-lease origin master
#
# 冲突常见场景：
#   - 上游改了 FolderManagerScreen.kt（你也改了）→ 合并双方的改动
#   - 上游改了 MediaScanner.kt（你也改了）→ 合并双方的改动
#   - 上游改了 strings.xml（你也加了新字符串）→ 合并双方的字符串
# ============================================================================
