name: 🔄 自动同步上游并构建

# 每天定时检查 Replica0110/Lyrico 是否有更新：
#   - 有更新：将本 fork 的自定义提交 rebase 到上游最新之上（保留所有自定义改动），
#             然后自动触发「构建内置插件版 APK (v7)」
#   - 无更新：什么都不做（节省 Actions 额度）
#   - rebase 冲突：工作流失败，需手动解决冲突后重新推送
# 也支持手动触发，可强制即使无更新也构建一次。
#
# 触发的 build-builtin-v7.yml 会重新检出 Lyrico-Plugins main 分支，
# 因此插件层面的更新（搜索逻辑、新平台对接等）每次构建都会自动跟进。
#
# 注意：默认 GITHUB_TOKEN 即可，无需额外 secret。
#       rebase 会重写历史，需要 force push；使用 --force-with-lease 保证安全。

on:
  schedule:
    # 每天 UTC 06:00 = 北京时间 14:00 运行
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: '即使上游无更新也强制触发一次构建'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync-and-build:
    name: 同步上游并按需触发构建
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出 fork
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔧 配置 git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: ⬆️ 同步上游 master（rebase 保留自定义改动）
        id: sync
        run: |
          set -e
          git remote add upstream https://github.com/Replica0110/Lyrico.git
          git fetch upstream master --tags
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/master)
          echo "local  = $LOCAL"
          echo "upstream= $UPSTREAM"
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "::notice::上游无更新，跳过"
          else
            # 找出 fork 相对上游基线的自定义提交数量
            MERGE_BASE=$(git merge-base HEAD upstream/master)
            CUSTOM_COUNT=$(git rev-list --count "${MERGE_BASE}..HEAD")
            echo "fork 自定义提交数: $CUSTOM_COUNT（基线 $MERGE_BASE）"
            if [ "$CUSTOM_COUNT" -eq 0 ]; then
              # 没有自定义提交，直接快进
              git merge upstream/master --ff-only
            else
              # 有自定义提交：rebase 到上游最新之上
              # 冲突时中止 rebase，工作流失败，避免丢失自定义改动
              if ! git rebase upstream/master; then
                echo "::error::rebase 冲突！请手动解决："
                echo "  1. 本地 git fetch upstream master"
                echo "  2. git rebase upstream/master"
                echo "  3. 解决冲突后 git rebase --continue"
                echo "  4. git push --force-with-lease"
                echo ""
                echo "冲突文件："
                git diff --name-only --diff-filter=U
                git rebase --abort
                exit 1
              fi
            fi
            # rebase 重写了历史，需要 force push
            git push --force-with-lease origin master
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "::notice::已同步上游到 $(git rev-parse --short HEAD)（rebase 保留自定义改动）"
          fi

      - name: 🚀 触发 v7 构建
        if: steps.sync.outputs.updated == 'true' || github.event.inputs.force_build == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # 在 fork 中 gh 默认会去查上游仓库，必须用 --repo 显式指向本 fork
          echo "触发 build-builtin-v7.yml ..."
          gh workflow run build-builtin-v7.yml --ref master --repo "$GITHUB_REPOSITORY"
          # 等几秒让 run 出现，然后打印最新 run 链接
          sleep 5
          LATEST=$(gh run list --workflow=build-builtin-v7.yml --repo "$GITHUB_REPOSITORY" --limit 1 --json databaseId,url --jq '.[0]')
          echo "最新构建：$LATEST"
          echo "::notice::已触发构建，可在 Actions 页查看"
