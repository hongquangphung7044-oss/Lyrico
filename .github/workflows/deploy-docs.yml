name: 📖 部署文档

on:
  push:
    branches: [ master ]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🥟 设置 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 安装依赖 & 构建文档
        run: |
          cd docs
          bun install --frozen-lockfile
          bun run docs:build

      - name: ⚙️ 配置 Pages
        uses: actions/configure-pages@v6

      - name: 📤 上传 artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
